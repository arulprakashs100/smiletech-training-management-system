<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Registration | SmileTech</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-container">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-panel p-4 p-md-5 bg-white shadow rounded-4">
                    <div class="text-center mb-4">
                        <a href="index.html" class="h3 fw-bold text-dark-blue mb-1 d-inline-block">
                            <i class="fa-solid fa-graduation-cap text-primary-custom me-2"></i>Smile<span class="text-primary-custom">Tech</span>
                        </a>
                        <p class="text-muted small">Register a new student or administrator account</p>
                    </div>

                    <!-- Validation alert container -->
                    <div id="reg-validation-alert" class="alert d-none py-2 px-3 small mb-3"></div>

                    <form id="register-form" onsubmit="validateRegisterForm(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label-custom">Register As (Role)</label>
                                <select class="form-select form-control-custom w-100" id="reg-role" required>
                                    <option value="" disabled selected>Select Role</option>
                                    <option value="user">User / Student</option>
                                    <option value="admin">Administrator</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Full Name</label>
                                <input type="text" class="form-control form-control-custom w-100" id="reg-name" required placeholder="Academic Full Name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Email Address</label>
                                <input type="email" class="form-control form-control-custom w-100" id="reg-email" required placeholder="name@domain.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Phone Number</label>
                                <input type="tel" class="form-control form-control-custom w-100" id="reg-phone" required placeholder="10-digit number">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Password</label>
                                <input type="password" class="form-control form-control-custom w-100" id="reg-password" required placeholder="Min 6 characters">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Confirm Password</label>
                                <input type="password" class="form-control form-control-custom w-100" id="reg-confirm" required placeholder="Verify password">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100 py-2.5 mt-4 mb-3">Create Portal Account</button>
                    </form>

                    <div class="text-center mt-2">
                        <span class="small text-muted">Already registered? <a href="login.html" class="text-primary-custom fw-semibold">Login Securely</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom script -->
    <script src="js/script.js"></script>
</body>
</html>
