<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="grad_15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#grad_15)" />

  <!-- Geometric Abstract Shapes -->
  <circle cx="750" cy="50" r="150" fill="#0ea5e9" opacity="0.08" />
  <rect x="-100" y="400" width="300" height="300" rx="30" fill="#0ea5e9" opacity="0.05" transform="rotate(15, 50, 550)" />
  <path d="M 0,0 L 800,150 L 800,0 Z" fill="#0ea5e9" opacity="0.04" />

  <!-- SmileTech Brand Tag -->
  <text x="40" y="50" font-family="'Poppins', sans-serif" font-size="16" font-weight="800" fill="#0ea5e9" letter-spacing="1">SMILETECH GALLERY</text>
  
  <!-- Category Badge -->
  <rect x="40" y="70" width="130" height="28" rx="14" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  <text x="105" y="89" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="0.5">INTERNSHIPS</text>

  <!-- Centered Content -->
  <!-- Main Title -->
  <text x="400" y="280" font-family="'Poppins', sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Summer Internship Batch</text>
  
  <!-- Subtitle -->
  <text x="400" y="335" font-family="'Poppins', sans-serif" font-size="20" font-weight="500" fill="#94a3b8" text-anchor="middle">Engineering Placement Core</text>

  <!-- Bottom accent strip -->
  <rect x="0" y="592" width="800" height="8" fill="#0ea5e9" />
</svg>